<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TERMINAL VELOCITY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Oswald:wght@300;400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; font-family:'Oswald',sans-serif; user-select:none; -webkit-user-select:none; }
  canvas { display:block; }

  #ui {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; z-index:10;
  }

  /* HUD */
  #hud {
    position:absolute; top:16px; left:16px; right:16px;
    display:flex; justify-content:space-between; align-items:flex-start;
    opacity:0; transition:opacity 0.6s;
  }
  #hud.show { opacity:1; }
  .hud-box {
    background:rgba(0,0,0,0.45); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.07); border-radius:6px;
    padding:8px 16px; min-width:100px;
  }
  .hud-label {
    font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:3px;
    text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:1px;
  }
  .hud-val {
    font-family:'Bebas Neue',sans-serif; font-size:28px; color:#fff;
    letter-spacing:2px; line-height:1;
  }
  .hud-val small { font-size:12px; opacity:0.35; }

  /* Altitude bar */
  #alt-track {
    position:absolute; right:16px; top:70px; bottom:70px; width:5px;
    background:rgba(255,255,255,0.06); border-radius:3px;
    opacity:0; transition:opacity 0.6s;
  }
  #alt-track.show { opacity:1; }
  #alt-fill {
    position:absolute; bottom:0; width:100%; border-radius:3px;
    background:linear-gradient(to top,#00ff88,#00bbff,#ff4466);
    transition:height 0.15s linear;
  }
  #deploy-marker {
    position:absolute; bottom:4%; left:-8px; width:22px; height:2px;
    background:#00ff88; border-radius:1px; opacity:0.5;
  }
  #deploy-label {
    position:absolute; bottom:calc(4% - 6px); left:-52px;
    font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:1px;
    color:rgba(0,255,136,0.45);
  }

  /* Combo */
  #combo {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Bebas Neue',sans-serif; font-size:48px; color:#ffcc00;
    text-shadow:0 0 20px rgba(255,204,0,0.5); opacity:0;
    transition:opacity 0.2s; pointer-events:none;
  }

  /* Near miss */
  #nearmiss {
    position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
    font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:4px;
    color:#00ffcc; text-shadow:0 0 12px rgba(0,255,200,0.6); opacity:0;
    transition:opacity 0.15s; text-transform:uppercase;
  }

  /* Speed brake */
  #speedbrake {
    position:absolute; top:60%; left:50%; transform:translate(-50%,-50%);
    font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:6px;
    color:#00ff88; text-shadow:0 0 20px rgba(0,255,136,0.6); opacity:0;
    transition:opacity 0.2s; text-transform:uppercase; pointer-events:none;
  }

  /* Zone banner */
  #zone-banner {
    position:absolute; top:45%; left:50%; transform:translate(-50%,-50%);
    font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,5vw,56px);
    letter-spacing:10px; color:rgba(255,255,255,0.8);
    text-shadow:0 0 40px rgba(100,200,255,0.4);
    opacity:0; transition:opacity 0.8s; pointer-events:none;
  }

  /* Warning pulse */
  #warn {
    position:absolute; top:0; left:0; width:100%; height:100%;
    border:3px solid transparent; pointer-events:none;
    transition:border-color 0.2s;
  }
  #warn.danger { border-color:rgba(255,50,50,0.3); animation:warnPulse 0.8s ease-in-out infinite; }
  @keyframes warnPulse {
    0%,100% { border-color:rgba(255,50,50,0.15); }
    50% { border-color:rgba(255,50,50,0.4); }
  }

  /* Vignette */
  #vignette {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events:none;
  }

  /* ---- SCREENS ---- */
  .screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:50; transition:opacity 1s ease; pointer-events:none; opacity:0;
  }
  .screen.show { opacity:1; pointer-events:all; }

  #start-screen { background:transparent; }

  .title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(50px,12vw,130px);
    color:#fff; letter-spacing:12px; line-height:0.88; text-align:center;
    text-shadow:0 0 80px rgba(0,150,255,0.3);
    animation:titleGlow 3s ease-in-out infinite;
  }
  @keyframes titleGlow {
    0%,100% { text-shadow:0 0 60px rgba(0,150,255,0.25); }
    50% { text-shadow:0 0 100px rgba(0,150,255,0.5), 0 4px 60px rgba(0,100,255,0.2); }
  }
  .subtitle {
    font-family:'JetBrains Mono',monospace; font-size:clamp(9px,1.3vw,13px);
    letter-spacing:8px; color:rgba(255,255,255,0.25); margin-top:10px;
    text-transform:uppercase;
  }
  .play-btn {
    margin-top:50px; font-family:'Oswald',sans-serif; font-weight:300;
    font-size:clamp(13px,1.8vw,18px); letter-spacing:6px; text-transform:uppercase;
    color:rgba(255,255,255,0.5); padding:14px 32px;
    border:1px solid rgba(255,255,255,0.1); border-radius:4px;
    cursor:pointer; transition:all 0.3s; background:none;
    pointer-events:all;
  }
  .play-btn:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.25); color:#fff; }
  .controls-info {
    margin-top:24px; font-family:'JetBrains Mono',monospace; font-size:10px;
    color:rgba(255,255,255,0.15); letter-spacing:2px; text-align:center; line-height:2.2;
  }

  /* End screens */
  #win-screen { background:radial-gradient(ellipse at center, rgba(0,50,30,0.92) 0%, rgba(0,0,0,0.97) 100%); }
  #death-screen { background:radial-gradient(ellipse at center, rgba(70,0,0,0.92) 0%, rgba(0,0,0,0.97) 100%); }
  .end-title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(42px,9vw,100px);
    letter-spacing:8px; color:#fff;
  }
  .end-stats {
    margin-top:18px; font-family:'JetBrains Mono',monospace; font-size:12px;
    color:rgba(255,255,255,0.35); letter-spacing:2px; text-align:center; line-height:2.4;
  }
  .end-stats span { color:rgba(255,255,255,0.85); font-weight:700; }
  .retry-btn {
    margin-top:36px; font-family:'Oswald',sans-serif; font-weight:300;
    font-size:15px; letter-spacing:5px; text-transform:uppercase;
    color:rgba(255,255,255,0.5); padding:12px 28px;
    border:1px solid rgba(255,255,255,0.12); border-radius:4px;
    cursor:pointer; background:none; transition:all 0.3s;
  }
  .retry-btn:hover { background:rgba(255,255,255,0.07); border-color:rgba(255,255,255,0.3); color:#fff; }

  /* Mobile D-Pad */
  #mobile-dpad {
    display:none; /* shown via JS on mobile */
    position:absolute;
    bottom:24px; left:50%; transform:translateX(-50%);
    z-index:45; pointer-events:all;
    width:160px; height:160px;
  }
  .dpad-btn {
    position:absolute;
    width:52px; height:52px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:12px;
    display:flex; align-items:center; justify-content:center;
    color:rgba(255,255,255,0.45);
    font-size:22px;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
    transition:background 0.1s, border-color 0.1s;
  }
  .dpad-btn.active {
    background:rgba(255,255,255,0.18);
    border-color:rgba(255,255,255,0.35);
    color:rgba(255,255,255,0.8);
  }
  .dpad-btn svg { width:22px; height:22px; fill:currentColor; }
  #dpad-up    { top:0;   left:50%;  transform:translateX(-50%); }
  #dpad-down  { bottom:0; left:50%; transform:translateX(-50%); }
  #dpad-left  { left:0;  top:50%;   transform:translateY(-50%); }
  #dpad-right { right:0; top:50%;   transform:translateY(-50%); }

  /* Cinematic parachute overlay */
  #chute-cinema {
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index:60; pointer-events:none; opacity:0;
    transition:opacity 0.6s ease;
  }
  #chute-cinema.show { opacity:1; }
  #chute-canvas { width:100%; height:100%; }

  /* ---- Coin HUD ---- */
  #coin-hud {
    position:absolute; top:16px; left:50%; transform:translateX(-50%);
    font-family:'Bebas Neue',sans-serif; font-size:22px; color:#ffd700;
    text-shadow:0 0 8px rgba(255,215,0,0.4);
    z-index:25; pointer-events:none; opacity:0; transition:opacity 0.4s;
    letter-spacing:2px;
  }
  #coin-hud.show { opacity:1; }
  .coin-icon { display:inline-block; width:16px; height:16px; background:#ffd700; border-radius:50%; margin-right:4px; vertical-align:middle; border:1px solid #b8960f; position:relative; top:-1px; }

  /* Coin earn popup */
  #coin-earn {
    position:absolute; top:55%; left:50%; transform:translate(-50%,-50%);
    font-family:'Bebas Neue',sans-serif; font-size:24px; color:#ffd700;
    text-shadow:0 0 12px rgba(255,215,0,0.5); opacity:0; pointer-events:none;
    transition:opacity 0.2s; z-index:20; letter-spacing:3px;
  }

  /* Wager display during game */
  #wager-hud {
    position:absolute; top:52px; left:50%; transform:translateX(-50%);
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px;
    color:rgba(255,180,0,0.5); z-index:25; pointer-events:none;
    opacity:0; transition:opacity 0.4s;
  }
  #wager-hud.show { opacity:1; }

  /* ---- Menu coin balance ---- */
  .menu-coins {
    font-family:'Bebas Neue',sans-serif; font-size:28px; color:#ffd700;
    text-shadow:0 0 10px rgba(255,215,0,0.3); letter-spacing:3px;
    margin-bottom:18px;
  }

  /* ---- Shop & Gamble buttons on start screen ---- */
  .menu-btns {
    display:flex; gap:12px; margin-top:16px; pointer-events:all;
  }
  .menu-btn {
    font-family:'Oswald',sans-serif; font-weight:300; font-size:13px;
    letter-spacing:4px; text-transform:uppercase; padding:10px 20px;
    border:1px solid rgba(255,255,255,0.12); border-radius:4px;
    background:none; color:rgba(255,255,255,0.45); cursor:pointer;
    transition:all 0.3s;
  }
  .menu-btn:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.25); color:#fff; }
  .menu-btn.gold { border-color:rgba(255,215,0,0.25); color:rgba(255,215,0,0.6); }
  .menu-btn.gold:hover { border-color:rgba(255,215,0,0.5); color:#ffd700; background:rgba(255,215,0,0.08); }

  /* ---- Shop Overlay ---- */
  #shop-screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index:200; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px);
    display:none; flex-direction:column; align-items:center;
    overflow-y:auto; padding:30px 16px;
  }
  #shop-screen.show { display:flex; }
  .shop-title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,6vw,52px);
    color:#fff; letter-spacing:8px; margin-bottom:6px;
  }
  .shop-coins {
    font-family:'Bebas Neue',sans-serif; font-size:22px; color:#ffd700;
    letter-spacing:3px; margin-bottom:20px;
  }
  .shop-section {
    width:100%; max-width:500px; margin-bottom:20px;
  }
  .shop-section-title {
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:4px;
    text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.06); padding-bottom:6px;
  }
  .shop-item {
    display:flex; justify-content:space-between; align-items:center;
    padding:10px 14px; margin-bottom:6px;
    background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06);
    border-radius:6px; transition:all 0.2s;
  }
  .shop-item:hover { background:rgba(255,255,255,0.06); }
  .shop-item.owned { border-color:rgba(0,255,136,0.2); }
  .shop-item.equipped { border-color:rgba(0,255,136,0.4); background:rgba(0,255,136,0.05); }
  .item-info { flex:1; }
  .item-name {
    font-family:'Oswald',sans-serif; font-size:15px; color:#fff; letter-spacing:1px;
  }
  .item-desc {
    font-family:'JetBrains Mono',monospace; font-size:9px; color:rgba(255,255,255,0.3);
    letter-spacing:1px; margin-top:2px;
  }
  .item-btn {
    font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:2px;
    padding:6px 14px; border-radius:4px; border:1px solid rgba(255,215,0,0.3);
    background:none; color:#ffd700; cursor:pointer; transition:all 0.2s;
    text-transform:uppercase; white-space:nowrap; margin-left:12px;
  }
  .item-btn:hover { background:rgba(255,215,0,0.1); border-color:#ffd700; }
  .item-btn.equipped-btn { border-color:rgba(0,255,136,0.3); color:#00ff88; cursor:default; }
  .item-btn:disabled { opacity:0.3; cursor:not-allowed; }
  .shop-close {
    margin-top:20px; margin-bottom:20px;
  }

  /* ---- Gamble Overlay ---- */
  #gamble-screen {
    position:absolute; top:0; left:0; width:100%; height:100%;
    z-index:200; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px);
    display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:30px 16px;
  }
  #gamble-screen.show { display:flex; }
  .gamble-title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,5vw,44px);
    color:#ff8800; letter-spacing:6px; margin-bottom:6px;
  }
  .gamble-subtitle {
    font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:3px;
    color:rgba(255,255,255,0.3); margin-bottom:20px; text-align:center;
    text-transform:uppercase;
  }
  .gamble-balance {
    font-family:'Bebas Neue',sans-serif; font-size:26px; color:#ffd700;
    letter-spacing:3px; margin-bottom:16px;
  }
  .gamble-input-row {
    display:flex; align-items:center; gap:10px; margin-bottom:18px;
  }
  .gamble-input {
    font-family:'Bebas Neue',sans-serif; font-size:28px; color:#ffd700;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,215,0,0.2);
    border-radius:6px; padding:8px 16px; width:120px; text-align:center;
    outline:none;
  }
  .gamble-input:focus { border-color:rgba(255,215,0,0.5); }
  .gamble-quick {
    font-family:'Oswald',sans-serif; font-size:11px; padding:6px 10px;
    border:1px solid rgba(255,255,255,0.1); border-radius:4px;
    background:none; color:rgba(255,255,255,0.4); cursor:pointer;
    transition:all 0.2s; letter-spacing:1px;
  }
  .gamble-quick:hover { background:rgba(255,255,255,0.06); color:#fff; }
  .gamble-confirm {
    font-family:'Oswald',sans-serif; font-size:15px; letter-spacing:4px;
    padding:12px 28px; border:1px solid rgba(255,180,0,0.3); border-radius:4px;
    background:none; color:#ff8800; cursor:pointer; transition:all 0.2s;
    text-transform:uppercase; margin-bottom:12px;
  }
  .gamble-confirm:hover { background:rgba(255,136,0,0.1); border-color:#ff8800; }
</style>
</head>
<body>

<div id="ui">
  <div id="vignette"></div>
  <div id="warn"></div>

  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">Altitude</div>
      <div class="hud-val" id="h-alt">7,500</div>
    </div>
    <div class="hud-box" style="text-align:center">
      <div class="hud-label">Speed</div>
      <div class="hud-val" id="h-spd">0 <small>MPH</small></div>
    </div>
    <div class="hud-box" style="text-align:right">
      <div class="hud-label">Zone</div>
      <div class="hud-val" id="h-zone">—</div>
    </div>
  </div>

  <div id="alt-track">
    <div id="alt-fill" style="height:100%"></div>
    <div id="deploy-marker"></div>
    <div id="deploy-label">DEPLOY</div>
  </div>

  <div id="combo"></div>
  <div id="nearmiss"></div>
  <div id="speedbrake"></div>
  <div id="zone-banner"></div>
  <div id="coin-hud"><span class="coin-icon"></span> <span id="coin-count">0</span></div>
  <div id="coin-earn"></div>
  <div id="wager-hud"></div>

  <!-- Screens -->
  <div id="start-screen" class="screen show">
    <div class="title">TERMINAL<br>VELOCITY</div>
    <div class="subtitle">A Descent Into Chaos</div>
    <div class="menu-coins"><span class="coin-icon"></span> <span id="menu-coin-count">0</span></div>
    <button class="play-btn" id="btn-start">PRESS TO JUMP</button>
    <div class="menu-btns">
      <button class="menu-btn" id="btn-shop">SHOP</button>
      <button class="menu-btn gold" id="btn-gamble">WAGER</button>
    </div>
    <div class="controls-info" id="controls-info">
      ← → ↑ ↓ ARROW KEYS / WASD TO STEER<br>
      DODGE EVERYTHING — SURVIVE THE FALL
    </div>
  </div>

  <div id="win-screen" class="screen">
    <div class="end-title" style="color:#00ff88">SAFE LANDING</div>
    <div class="end-stats" id="win-stats"></div>
    <div id="win-coins" style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:#ffd700;letter-spacing:3px;margin-top:10px;text-shadow:0 0 10px rgba(255,215,0,0.3)"></div>
    <button class="retry-btn" id="btn-win">JUMP AGAIN</button>
    <div class="menu-btns">
      <button class="menu-btn" onclick="renderShop();document.getElementById('shop-screen').classList.add('show')">SHOP</button>
      <button class="menu-btn gold" onclick="updateAllCoinDisplays();document.getElementById('gamble-amount').value='';document.getElementById('gamble-screen').classList.add('show')">WAGER</button>
    </div>
  </div>

  <div id="death-screen" class="screen">
    <div class="end-title" style="color:#ff4444">WIPEOUT</div>
    <div class="end-stats" id="death-stats"></div>
    <div id="death-coins" style="font-family:'Bebas Neue',sans-serif;font-size:22px;color:rgba(255,215,0,0.6);letter-spacing:3px;margin-top:10px"></div>
    <button class="retry-btn" id="btn-death">TRY AGAIN</button>
    <div class="menu-btns">
      <button class="menu-btn" onclick="renderShop();document.getElementById('shop-screen').classList.add('show')">SHOP</button>
      <button class="menu-btn gold" onclick="updateAllCoinDisplays();document.getElementById('gamble-amount').value='';document.getElementById('gamble-screen').classList.add('show')">WAGER</button>
    </div>
  </div>
</div>

<!-- Shop Screen -->
<div id="shop-screen">
  <div class="shop-title">SHOP</div>
  <div class="shop-coins"><span class="coin-icon"></span> <span id="shop-coin-count">0</span></div>
  <div id="shop-items"></div>
  <button class="menu-btn shop-close" id="btn-shop-close">BACK</button>
</div>

<!-- Gamble Screen -->
<div id="gamble-screen">
  <div class="gamble-title">HIGH STAKES</div>
  <div class="gamble-subtitle">Wager coins — survive the fall to double them.<br>Die and lose it all.</div>
  <div class="gamble-balance"><span class="coin-icon"></span> <span id="gamble-coin-count">0</span></div>
  <div class="gamble-input-row">
    <input type="number" class="gamble-input" id="gamble-amount" min="0" value="0" placeholder="0">
  </div>
  <div class="gamble-input-row">
    <button class="gamble-quick" data-pct="10">10%</button>
    <button class="gamble-quick" data-pct="25">25%</button>
    <button class="gamble-quick" data-pct="50">50%</button>
    <button class="gamble-quick" data-pct="100">ALL IN</button>
  </div>
  <button class="gamble-confirm" id="btn-gamble-confirm">LOCK IN WAGER</button>
  <button class="menu-btn" id="btn-gamble-close">BACK</button>
</div>

<!-- Mobile D-Pad -->
<div id="mobile-dpad">
  <div class="dpad-btn" id="dpad-up" data-dir="up">
    <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h16z"/></svg>
  </div>
  <div class="dpad-btn" id="dpad-down" data-dir="down">
    <svg viewBox="0 0 24 24"><path d="M12 20l8-8H4z"/></svg>
  </div>
  <div class="dpad-btn" id="dpad-left" data-dir="left">
    <svg viewBox="0 0 24 24"><path d="M4 12l8-8v16z"/></svg>
  </div>
  <div class="dpad-btn" id="dpad-right" data-dir="right">
    <svg viewBox="0 0 24 24"><path d="M20 12l-8 8V4z"/></svg>
  </div>
</div>

<!-- Cinematic parachute overlay -->
<div id="chute-cinema">
  <canvas id="chute-canvas"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// TERMINAL VELOCITY — Full 3D Skydiving Game (Three.js)
// ═══════════════════════════════════════════════════════

// ---- Constants ----
const START_ALT   = 7500;
const DEPLOY_ALT  = 300;
const CORRIDOR_R  = 28;   // cylinder radius of play area
const CORRIDOR_W  = CORRIDOR_R; // alias for obstacle gen compatibility
const CORRIDOR_D  = CORRIDOR_R;
const OBS_SPACING = 60;   // vertical gap between obstacle rows
const PLAYER_HITBOX = 1.4;
const TERMINAL_VEL = 65;  // mph cap
const TERMINAL_SPD = TERMINAL_VEL / 30; // internal speed units (HUD shows speed*30 as mph)

// ---- State ----
const S = { MENU:0, PLAY:1, DYING:2, CHUTE:3, WIN:4 };
let state = S.MENU;
let altitude, speed, maxSpd, playerVX, playerVZ, tiltX, tiltZ;
let gameTime, obsPassed, nearMisses, combo, maxCombo, comboTime;
let ringsHit = 0;
let dieTimer, chuteTimer, fallDist;
let invulnFrames = 0;
let lastZoneName = '';
let shakeAmt = 0;

// ═══════════════════════════════════════════
// COINS / SHOP / GAMBLING SYSTEM
// ═══════════════════════════════════════════
let totalCoins = 0;        // persistent balance
let runCoins = 0;          // coins earned this run
let lastCoinAlt = 0;       // tracks altitude for coin ticks
let currentWager = 0;      // active wager amount
let coinEarnTimer = 0;

// Active bonuses (single-use, consumed on run start)
let activeBonus = { shield:false, magnet:false, headstart:false };

// ---- Save / Load (using window.storage if available, else in-memory) ----
let saveData = { coins:0, owned:[], equipped:'default', upgrades:{} };

async function loadSave() {
  try {
    const r = await window.storage.get('tv-save');
    if (r && r.value) saveData = JSON.parse(r.value);
  } catch(e) { /* first load or no storage */ }
  totalCoins = saveData.coins || 0;
  updateAllCoinDisplays();
}
async function persistSave() {
  saveData.coins = totalCoins;
  try { await window.storage.set('tv-save', JSON.stringify(saveData)); } catch(e) {}
}

function updateAllCoinDisplays() {
  document.getElementById('coin-count').textContent = totalCoins.toLocaleString();
  document.getElementById('menu-coin-count').textContent = totalCoins.toLocaleString();
  const sc = document.getElementById('shop-coin-count');
  if (sc) sc.textContent = totalCoins.toLocaleString();
  const gc = document.getElementById('gamble-coin-count');
  if (gc) gc.textContent = totalCoins.toLocaleString();
}

// ---- Shop Items ----
const SHOP_ITEMS = {
  skins: [
    { id:'default', name:'Standard Issue', desc:'Classic red jumpsuit', cost:0 , colors:{ body:0xff5533, emissive:0x331100, helmet:0x222222, goggle:0x44ccff }},
    { id:'arctic', name:'Arctic Ghost', desc:'White stealth suit', cost:150, colors:{ body:0xddeeff, emissive:0x223344, helmet:0x445566, goggle:0x88ddff }},
    { id:'neon', name:'Neon Blaze', desc:'High-vis cyberpunk', cost:300, colors:{ body:0x00ff88, emissive:0x003322, helmet:0x111111, goggle:0xff00ff }},
    { id:'gold', name:'Golden Eagle', desc:'For the wealthy diver', cost:750, colors:{ body:0xffd700, emissive:0x443300, helmet:0x332200, goggle:0xff4400 }},
    { id:'void', name:'Void Walker', desc:'Dark matter suit', cost:1200, colors:{ body:0x220033, emissive:0x110022, helmet:0x000000, goggle:0xaa00ff }},
    { id:'inferno', name:'Inferno', desc:'Born from the sun', cost:2000, colors:{ body:0xff2200, emissive:0x661100, helmet:0x440000, goggle:0xffaa00 }},
  ],
  upgrades: [
    { id:'hitbox1', name:'Slim Fit I', desc:'5% smaller hitbox', cost:200, max:1, effect:'hitbox', val:0.05 },
    { id:'hitbox2', name:'Slim Fit II', desc:'10% smaller hitbox', cost:500, max:1, requires:'hitbox1', effect:'hitbox', val:0.10 },
    { id:'accel1', name:'Quick Reflexes I', desc:'+15% move speed', cost:150, max:1, effect:'accel', val:0.15 },
    { id:'accel2', name:'Quick Reflexes II', desc:'+30% move speed', cost:400, max:1, requires:'accel1', effect:'accel', val:0.30 },
    { id:'coinmult', name:'Coin Magnet', desc:'Earn 50% more coins', cost:350, max:1, effect:'coinmult', val:1.5 },
    { id:'ringboost', name:'Ring Master', desc:'Rings slow you 25 MPH', cost:500, max:1, effect:'ringboost', val:25 },
  ],
  bonuses: [
    { id:'shield', name:'Shield', desc:'Survive one hit this run', cost:100, effect:'shield' },
    { id:'headstart', name:'Head Start', desc:'Start at 5000 FT instead', cost:75, effect:'headstart' },
  ]
};

function getUpgradeVal(effect, fallback) {
  for (const u of SHOP_ITEMS.upgrades) {
    if (u.effect === effect && (saveData.upgrades[u.id] || 0) > 0) return u.val;
  }
  return fallback;
}

function applySkin(skinId) {
  const skin = SHOP_ITEMS.skins.find(s => s.id === skinId);
  if (!skin) return;
  bodyMat.color.setHex(skin.colors.body);
  bodyMat.emissive.setHex(skin.colors.emissive);
  helmetMat.color.setHex(skin.colors.helmet);
  gogMat.color.setHex(skin.colors.goggle);
}

// ---- Render Shop ----
function renderShop() {
  const container = document.getElementById('shop-items');
  updateAllCoinDisplays();
  let html = '';

  // Skins
  html += '<div class="shop-section"><div class="shop-section-title">Suits</div>';
  for (const s of SHOP_ITEMS.skins) {
    const owned = s.cost === 0 || (saveData.owned || []).includes(s.id);
    const equipped = saveData.equipped === s.id;
    const cls = equipped ? 'shop-item equipped' : owned ? 'shop-item owned' : 'shop-item';
    let btn = '';
    if (equipped) btn = '<button class="item-btn equipped-btn">EQUIPPED</button>';
    else if (owned) btn = `<button class="item-btn" onclick="equipSkin('${s.id}')">EQUIP</button>`;
    else btn = `<button class="item-btn" ${totalCoins < s.cost ? 'disabled' : ''} onclick="buySkin('${s.id}')"><span class="coin-icon" style="width:10px;height:10px;margin-right:3px"></span>${s.cost}</button>`;
    html += `<div class="${cls}"><div class="item-info"><div class="item-name" style="color:#${s.colors.body.toString(16).padStart(6,'0')}">${s.name}</div><div class="item-desc">${s.desc}</div></div>${btn}</div>`;
  }
  html += '</div>';

  // Upgrades
  html += '<div class="shop-section"><div class="shop-section-title">Upgrades</div>';
  for (const u of SHOP_ITEMS.upgrades) {
    const owned = (saveData.upgrades[u.id] || 0) >= (u.max || 1);
    const locked = u.requires && !(saveData.upgrades[u.requires] || 0);
    let btn = '';
    if (owned) btn = '<button class="item-btn equipped-btn">OWNED</button>';
    else if (locked) btn = `<button class="item-btn" disabled>LOCKED</button>`;
    else btn = `<button class="item-btn" ${totalCoins < u.cost ? 'disabled' : ''} onclick="buyUpgrade('${u.id}')"><span class="coin-icon" style="width:10px;height:10px;margin-right:3px"></span>${u.cost}</button>`;
    html += `<div class="shop-item ${owned?'owned':''}"><div class="item-info"><div class="item-name">${u.name}</div><div class="item-desc">${u.desc}</div></div>${btn}</div>`;
  }
  html += '</div>';

  // Single-use bonuses
  html += '<div class="shop-section"><div class="shop-section-title">Single-Use Bonuses</div>';
  for (const b of SHOP_ITEMS.bonuses) {
    const active = activeBonus[b.effect];
    let btn = '';
    if (active) btn = '<button class="item-btn equipped-btn">READY</button>';
    else btn = `<button class="item-btn" ${totalCoins < b.cost ? 'disabled' : ''} onclick="buyBonus('${b.effect}',${b.cost})"><span class="coin-icon" style="width:10px;height:10px;margin-right:3px"></span>${b.cost}</button>`;
    html += `<div class="shop-item ${active?'equipped':''}"><div class="item-info"><div class="item-name">${b.name}</div><div class="item-desc">${b.desc}${active?' — ARMED':''}</div></div>${btn}</div>`;
  }
  html += '</div>';

  container.innerHTML = html;
}

function buySkin(id) {
  const s = SHOP_ITEMS.skins.find(x => x.id === id);
  if (!s || totalCoins < s.cost) return;
  totalCoins -= s.cost;
  if (!saveData.owned) saveData.owned = [];
  saveData.owned.push(id);
  saveData.equipped = id;
  applySkin(id);
  persistSave();
  renderShop();
}

function equipSkin(id) {
  saveData.equipped = id;
  applySkin(id);
  persistSave();
  renderShop();
}

function buyUpgrade(id) {
  const u = SHOP_ITEMS.upgrades.find(x => x.id === id);
  if (!u || totalCoins < u.cost) return;
  totalCoins -= u.cost;
  if (!saveData.upgrades) saveData.upgrades = {};
  saveData.upgrades[id] = (saveData.upgrades[id] || 0) + 1;
  persistSave();
  renderShop();
}

function buyBonus(effect, cost) {
  if (totalCoins < cost) return;
  totalCoins -= cost;
  activeBonus[effect] = true;
  persistSave();
  renderShop();
}

// ---- Shop / Gamble UI Events ----
document.getElementById('btn-shop').addEventListener('click', () => {
  renderShop();
  document.getElementById('shop-screen').classList.add('show');
});
document.getElementById('btn-shop-close').addEventListener('click', () => {
  document.getElementById('shop-screen').classList.remove('show');
});
document.getElementById('btn-gamble').addEventListener('click', () => {
  updateAllCoinDisplays();
  document.getElementById('gamble-amount').value = '';
  document.getElementById('gamble-amount').max = totalCoins;
  document.getElementById('gamble-screen').classList.add('show');
});
document.getElementById('btn-gamble-close').addEventListener('click', () => {
  document.getElementById('gamble-screen').classList.remove('show');
});

// Quick wager buttons
document.querySelectorAll('.gamble-quick').forEach(btn => {
  btn.addEventListener('click', () => {
    const pct = parseInt(btn.dataset.pct);
    const val = Math.floor(totalCoins * pct / 100);
    document.getElementById('gamble-amount').value = val;
  });
});

document.getElementById('btn-gamble-confirm').addEventListener('click', () => {
  const input = document.getElementById('gamble-amount');
  let amt = parseInt(input.value) || 0;
  amt = Math.max(0, Math.min(amt, totalCoins));
  if (amt <= 0) { document.getElementById('gamble-screen').classList.remove('show'); return; }
  currentWager = amt;
  totalCoins -= amt;
  persistSave();
  document.getElementById('gamble-screen').classList.remove('show');
  startGame();
});

// ---- Coin Earning During Gameplay ----
function tickCoins() {
  const altDrop = lastCoinAlt - altitude;
  if (altDrop >= 10) {
    const ticks = Math.floor(altDrop / 10);
    const mult = getUpgradeVal('coinmult', 1);
    const earned = Math.floor(ticks * mult);
    runCoins += earned;
    lastCoinAlt -= ticks * 10;
    document.getElementById('coin-count').textContent = (totalCoins + runCoins).toLocaleString();
  }
}

function showCoinEarn(amount, label) {
  const el = document.getElementById('coin-earn');
  el.textContent = `+${amount} COINS${label ? ' — '+label : ''}`;
  el.style.opacity = '1';
  coinEarnTimer = 80;
}

// ---- Initialize ----
loadSave();

// ---- Three.js Setup ----
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.5, 800);
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = false;
document.body.prepend(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---- Fog & Lighting ----
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.004);

const ambLight = new THREE.AmbientLight(0x334466, 0.6);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(20, 50, 10);
scene.add(dirLight);
const rimLight = new THREE.DirectionalLight(0x4488ff, 0.3);
rimLight.position.set(-15, -30, -10);
scene.add(rimLight);

// ---- Player ----
const playerGroup = new THREE.Group();
scene.add(playerGroup);

// Inner group that holds the actual model — rotated so player faces DOWN
const playerModel = new THREE.Group();
playerModel.rotation.x = Math.PI; // flip 180° so head points down
playerGroup.add(playerModel);

// Body
const bodyGeo = new THREE.SphereGeometry(1, 12, 8);
bodyGeo.scale(0.7, 1, 0.5);
const bodyMat = new THREE.MeshPhongMaterial({ color:0xff5533, emissive:0x331100, shininess:40 });
const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
playerModel.add(bodyMesh);

// Head
const headGeo = new THREE.SphereGeometry(0.38, 10, 8);
const headMat = new THREE.MeshPhongMaterial({ color:0xffcc99, emissive:0x221100 });
const headMesh = new THREE.Mesh(headGeo, headMat);
headMesh.position.y = 1.05;
playerModel.add(headMesh);

// Helmet
const helmetGeo = new THREE.SphereGeometry(0.42, 10, 6, 0, Math.PI*2, 0, Math.PI*0.6);
const helmetMat = new THREE.MeshPhongMaterial({ color:0x222222, shininess:80 });
const helmetMesh = new THREE.Mesh(helmetGeo, helmetMat);
helmetMesh.position.y = 1.12;
playerModel.add(helmetMesh);

// Goggles
const gogGeo = new THREE.SphereGeometry(0.22, 8, 6);
gogGeo.scale(1.6, 0.6, 0.6);
const gogMat = new THREE.MeshPhongMaterial({ color:0x44ccff, emissive:0x113344, shininess:100, transparent:true, opacity:0.85 });
const gogMesh = new THREE.Mesh(gogGeo, gogMat);
gogMesh.position.set(0, 0.98, 0.28);
playerModel.add(gogMesh);

// Arms — spread wide in skydive position
function makeArm(side) {
  const g = new THREE.CylinderGeometry(0.12, 0.1, 1.4, 6);
  const m = new THREE.Mesh(g, bodyMat);
  m.position.set(side * 1.1, 0.1, 0);
  m.rotation.z = side * 0.7;
  return m;
}
const armL = makeArm(-1); const armR = makeArm(1);
playerModel.add(armL, armR);

// Legs — slightly spread
function makeLeg(side) {
  const g = new THREE.CylinderGeometry(0.13, 0.1, 1.2, 6);
  const m = new THREE.Mesh(g, bodyMat);
  m.position.set(side * 0.35, -1.1, 0);
  m.rotation.z = side * -0.15;
  return m;
}
const legL = makeLeg(-1); const legR = makeLeg(1);
playerModel.add(legL, legR);

// Trail particles (ring buffer)
const TRAIL_COUNT = 80;
const trailGeo = new THREE.BufferGeometry();
const trailPositions = new Float32Array(TRAIL_COUNT * 3);
const trailAlphas = new Float32Array(TRAIL_COUNT);
trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeo.setAttribute('alpha', new THREE.BufferAttribute(trailAlphas, 1));
const trailMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  vertexShader: `
    attribute float alpha;
    varying float vAlpha;
    void main(){
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      gl_PointSize = max(1.0, 6.0 * (200.0 / -mv.z));
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader: `
    varying float vAlpha;
    void main(){
      float d = length(gl_PointCoord - vec2(0.5));
      if(d > 0.5) discard;
      gl_FragColor = vec4(1.0, 0.55, 0.25, vAlpha * (1.0 - d*2.0));
    }
  `
});
const trailPoints = new THREE.Points(trailGeo, trailMat);
scene.add(trailPoints);
let trailIdx = 0;

// ---- Parachute ----
const chuteGroup = new THREE.Group();
chuteGroup.visible = false;
playerModel.add(chuteGroup);

const canopyGeo = new THREE.SphereGeometry(4, 16, 10, 0, Math.PI*2, 0, Math.PI*0.5);
const canopyMat = new THREE.MeshPhongMaterial({ color:0xff5533, emissive:0x331100, side:THREE.DoubleSide, transparent:true, opacity:0.85 });
const canopyMesh = new THREE.Mesh(canopyGeo, canopyMat);
canopyMesh.position.y = 6;
canopyMesh.scale.set(1, 0.7, 1);
chuteGroup.add(canopyMesh);

// Canopy stripes
for (let i = 0; i < 6; i++) {
  const stripeGeo = new THREE.SphereGeometry(4.05, 16, 10, i*Math.PI/3, Math.PI/8, 0, Math.PI*0.5);
  const stripeMat = new THREE.MeshPhongMaterial({ color:0xffffff, emissive:0x222222, side:THREE.DoubleSide, transparent:true, opacity:0.35 });
  const stripe = new THREE.Mesh(stripeGeo, stripeMat);
  stripe.position.y = 6;
  stripe.scale.set(1, 0.7, 1);
  chuteGroup.add(stripe);
}

// Lines
const lineMat = new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0.3 });
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  const pts = [
    new THREE.Vector3(0, 1.5, 0),
    new THREE.Vector3(Math.cos(angle)*2.5, 4.5, Math.sin(angle)*2.5),
    new THREE.Vector3(Math.cos(angle)*3.8, 5.8, Math.sin(angle)*3.8)
  ];
  const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  chuteGroup.add(new THREE.Line(lineGeo, lineMat));
}

// ---- Obstacle Pool ----
let obstacles = [];   // { mesh, bb (Box3), passed, type }
const obsMaterials = {};
function getObsMat(color, emissive) {
  const key = color + '_' + emissive;
  if (!obsMaterials[key]) {
    obsMaterials[key] = new THREE.MeshPhongMaterial({ color, emissive, shininess:60, transparent:true, opacity:0.92 });
  }
  return obsMaterials[key];
}

function zoneColors(alt) {
  if (alt > 6000) return { obs:0x4466ff, em:0x111133, fog:0x0a0a2a, name:'STRATOSPHERE' };
  if (alt > 4500) return { obs:0x44aaff, em:0x112233, fog:0x0a1a3a, name:'HIGH ALTITUDE' };
  if (alt > 3000) return { obs:0x66ccee, em:0x112828, fog:0x1a3050, name:'CLOUD LAYER' };
  if (alt > 1500) return { obs:0xffaa44, em:0x332200, fog:0x2a3a30, name:'TURBULENCE' };
  if (alt > 750)  return { obs:0xff6644, em:0x331100, fog:0x3a4a30, name:'LOW ALTITUDE' };
  return              { obs:0xff3333, em:0x330000, fog:0x4a2a20, name:'DANGER ZONE' };
}

// ---- Obstacle Generation ----
let nextObsY = 0; // world-Y at which to spawn next row (going negative = downward)

function spawnObstacleRow(worldY) {
  const progress = 1 - altitude / START_ALT; // 0..1
  const zc = zoneColors(altitude);
  const mat = getObsMat(zc.obs, zc.em);

  // Glow edge material
  const edgeMat = new THREE.MeshPhongMaterial({ color:zc.obs, emissive:zc.obs, transparent:true, opacity:0.3 });

  const type = pickObstacleType(progress);

  switch (type) {
    case 'beam': {
      // Beam that spans across the cylinder at a random angle
      const beamAngle = Math.random() * Math.PI; // random orientation
      const w = 10 + Math.random() * 22;
      const h = 1.5 + Math.random() * 1;
      const d = 3 + Math.random() * 4;
      const geo = new THREE.BoxGeometry(w, h, d);
      const mesh = new THREE.Mesh(geo, mat);
      // Position randomly within cylinder using polar coords
      const bR = Math.random() * (CORRIDOR_R * 0.7);
      const bA = Math.random() * Math.PI * 2;
      mesh.position.set(Math.cos(bA) * bR, worldY, Math.sin(bA) * bR);
      mesh.rotation.y = beamAngle;
      scene.add(mesh);
      addGlowEdge(mesh, w, h, d, edgeMat);
      const bb = new THREE.Box3().setFromObject(mesh);
      obstacles.push({ mesh, bb, passed:false, type:'beam', y:worldY, parts:[mesh] });
      break;
    }
    case 'gate': {
      const gapW = Math.max(8, 16 - progress * 8);
      const wallAngle = Math.random() * Math.PI; // random orientation across cylinder
      const wallH = 2.5;
      const wallD = 3;
      // Gap position along the wall (offset from center)
      const gapOffset = (Math.random() - 0.5) * (CORRIDOR_R * 1.2);

      const parts = [];
      // Left section (from -CORRIDOR_R to gap)
      const leftLen = CORRIDOR_R + gapOffset - gapW/2;
      if (leftLen > 2) {
        const geo = new THREE.BoxGeometry(leftLen, wallH, wallD);
        const m = new THREE.Mesh(geo, mat);
        m.position.set(-leftLen/2 - gapW/2 + gapOffset, worldY, 0);
        m.rotation.y = wallAngle;
        // Rotate position around center
        const px = m.position.x, pz = m.position.z;
        m.position.x = px * Math.cos(wallAngle) - pz * Math.sin(wallAngle);
        m.position.z = px * Math.sin(wallAngle) + pz * Math.cos(wallAngle);
        scene.add(m);
        addGlowEdge(m, leftLen, wallH, wallD, edgeMat);
        parts.push(m);
      }
      // Right section (from gap to +CORRIDOR_R)
      const rightLen = CORRIDOR_R - gapOffset - gapW/2;
      if (rightLen > 2) {
        const geo = new THREE.BoxGeometry(rightLen, wallH, wallD);
        const m = new THREE.Mesh(geo, mat);
        m.position.set(rightLen/2 + gapW/2 + gapOffset, worldY, 0);
        m.rotation.y = wallAngle;
        const px = m.position.x, pz = m.position.z;
        m.position.x = px * Math.cos(wallAngle) - pz * Math.sin(wallAngle);
        m.position.z = px * Math.sin(wallAngle) + pz * Math.cos(wallAngle);
        scene.add(m);
        addGlowEdge(m, rightLen, wallH, wallD, edgeMat);
        parts.push(m);
      }
      if (parts.length === 0) break;
      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'gate', y:worldY, parts, gapX:gapOffset, gapW, gapZ:0, wallAngle });
      break;
    }
    case 'pillars': {
      const count = 3 + Math.floor(Math.random() * 3);
      const parts = [];
      for (let i = 0; i < count; i++) {
        const r = 1 + Math.random() * 2;
        const h = 4 + Math.random() * 6;
        const geo = new THREE.CylinderGeometry(r, r, h, 10);
        const m = new THREE.Mesh(geo, mat);
        // Polar distribution within cylinder
        const pR = Math.random() * CORRIDOR_R * 0.85;
        const pA = Math.random() * Math.PI * 2;
        m.position.set(Math.cos(pA) * pR, worldY, Math.sin(pA) * pR);
        scene.add(m);
        parts.push(m);
      }
      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'pillars', y:worldY, parts });
      break;
    }
    case 'ring': {
      const innerR = Math.max(5, 10 - progress * 4);
      const outerR = innerR + 2;
      // Rings are OPTIONAL — green/teal to signal "bonus" not "death"
      const ringObsMat = new THREE.MeshPhongMaterial({ color:0x00ff88, emissive:0x003322, shininess:80, transparent:true, opacity:0.85 });
      // Build ring from segments
      const parts = [];
      const segments = 24;
      for (let i = 0; i < segments; i++) {
        const a1 = (i / segments) * Math.PI * 2;
        const a2 = ((i+1) / segments) * Math.PI * 2;
        const mx = (Math.cos(a1)+Math.cos(a2))/2 * outerR;
        const mz = (Math.sin(a1)+Math.sin(a2))/2 * outerR;
        const segLen = outerR * (Math.PI*2/segments) * 1.05;
        const geo = new THREE.BoxGeometry(segLen, 2, outerR - innerR);
        const m = new THREE.Mesh(geo, ringObsMat);
        m.position.set(mx, worldY, mz);
        m.rotation.y = -(a1+a2)/2 + Math.PI/2;
        scene.add(m);
        parts.push(m);
      }
      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'ring', y:worldY, parts, innerR, _ringTriggered:false });
      break;
    }
    case 'cross': {
      const armLen = 10 + Math.random() * 12;
      const armW = 2 + Math.random() * 2;
      const parts = [];
      const rotY = Math.random() * Math.PI;
      for (let a = 0; a < 2; a++) {
        const geo = new THREE.BoxGeometry(armLen, 1.8, armW);
        const m = new THREE.Mesh(geo, mat);
        m.position.set(0, worldY, 0);
        m.rotation.y = rotY + a * Math.PI/2;
        scene.add(m);
        addGlowEdge(m, armLen, 1.8, armW, edgeMat);
        parts.push(m);
      }
      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'cross', y:worldY, parts, rotSpeed:0.005 + Math.random()*0.01 });
      break;
    }
    case 'grid': {
      const parts = [];
      // Distribute blocks across the cylinder cross-section
      const count = 8 + Math.floor(Math.random() * 5);
      const skipAngle = Math.random() * Math.PI * 2;
      const skipR = Math.random() * CORRIDOR_R * 0.5 + 2;
      for (let i = 0; i < count; i++) {
        const gR = Math.random() * CORRIDOR_R * 0.9;
        const gA = Math.random() * Math.PI * 2;
        const gx = Math.cos(gA) * gR;
        const gz = Math.sin(gA) * gR;
        // Skip zone — create a navigable gap
        const distToSkip = Math.sqrt((gx - Math.cos(skipAngle)*skipR)**2 + (gz - Math.sin(skipAngle)*skipR)**2);
        if (distToSkip < 7) continue;
        const bw = 4 + Math.random() * 5;
        const bd = 4 + Math.random() * 5;
        const geo = new THREE.BoxGeometry(bw, 1.5, bd);
        const m = new THREE.Mesh(geo, mat);
        m.position.set(gx, worldY, gz);
        m.rotation.y = Math.random() * Math.PI;
        scene.add(m);
        parts.push(m);
      }
      if (parts.length === 0) break;
      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'grid', y:worldY, parts });
      break;
    }
    case 'spinner': {
      const parts = [];
      const blades = 2 + Math.floor(Math.random()*2);
      const pivot = new THREE.Group();
      const spR = Math.random() * CORRIDOR_R * 0.4;
      const spA = Math.random() * Math.PI * 2;
      pivot.position.set(Math.cos(spA)*spR, worldY, Math.sin(spA)*spR);
      scene.add(pivot);
      for (let b = 0; b < blades; b++) {
        const len = 8 + Math.random()*8;
        const geo = new THREE.BoxGeometry(len, 1.5, 2);
        const m = new THREE.Mesh(geo, mat);
        m.rotation.y = (b/blades) * Math.PI;
        m.position.set(Math.cos(m.rotation.y)*len/2, 0, Math.sin(m.rotation.y)*len/2);
        pivot.add(m);
        parts.push(m);
      }
      obstacles.push({ mesh:pivot, bb:new THREE.Box3(), passed:false, type:'spinner', y:worldY, parts:[pivot], pivot, rotSpeed:0.008+Math.random()*0.015 });
      break;
    }
    case 'laserH': {
      // Laser beam spanning across the cylinder at a random angle with gap
      const laserAngle = Math.random() * Math.PI;
      const gapW = Math.max(7, 12 - progress*5);
      const gapCenter = (Math.random()-0.5) * CORRIDOR_R * 0.8;
      const parts = [];
      const laserMat = new THREE.MeshPhongMaterial({ color:0xff2244, emissive:0xff1133, transparent:true, opacity:0.7 });

      // Left beam
      const lLen = CORRIDOR_R + gapCenter - gapW/2;
      if (lLen > 1) {
        const geo = new THREE.BoxGeometry(lLen, 0.3, 0.3);
        const m = new THREE.Mesh(geo, laserMat);
        const cx = -lLen/2 - gapW/2 + gapCenter;
        m.position.set(
          cx * Math.cos(laserAngle),
          worldY,
          cx * Math.sin(laserAngle)
        );
        m.rotation.y = laserAngle;
        scene.add(m);
        parts.push(m);
      }
      // Right beam
      const rLen = CORRIDOR_R - gapCenter - gapW/2;
      if (rLen > 1) {
        const geo = new THREE.BoxGeometry(rLen, 0.3, 0.3);
        const m = new THREE.Mesh(geo, laserMat);
        const cx = rLen/2 + gapW/2 + gapCenter;
        m.position.set(
          cx * Math.cos(laserAngle),
          worldY,
          cx * Math.sin(laserAngle)
        );
        m.rotation.y = laserAngle;
        scene.add(m);
        parts.push(m);
      }
      // Emitter nodes
      const nodeMat = new THREE.MeshPhongMaterial({ color:0xff4466, emissive:0xff2244, shininess:100 });
      const nodeGeo = new THREE.SphereGeometry(0.5, 8, 6);
      const gapLx = (gapCenter - gapW/2) * Math.cos(laserAngle);
      const gapLz = (gapCenter - gapW/2) * Math.sin(laserAngle);
      const gapRx = (gapCenter + gapW/2) * Math.cos(laserAngle);
      const gapRz = (gapCenter + gapW/2) * Math.sin(laserAngle);
      const nL = new THREE.Mesh(nodeGeo, nodeMat);
      nL.position.set(gapLx, worldY, gapLz);
      scene.add(nL); parts.push(nL);
      const nR = new THREE.Mesh(nodeGeo, nodeMat);
      nR.position.set(gapRx, worldY, gapRz);
      scene.add(nR); parts.push(nR);

      const bb = new THREE.Box3();
      parts.forEach(p => bb.union(new THREE.Box3().setFromObject(p)));
      obstacles.push({ mesh:parts[0], bb, passed:false, type:'laserH', y:worldY, parts, gapCenter, gapW, laserAngle });
      break;
    }
  }
}

function pickObstacleType(progress) {
  const pool = ['beam', 'gate'];
  if (progress > 0.08) pool.push('pillars', 'gate');
  if (progress > 0.2)  pool.push('ring', 'cross');
  if (progress > 0.35) pool.push('grid', 'laserH');
  if (progress > 0.5)  pool.push('spinner', 'cross', 'ring');
  if (progress > 0.65) pool.push('spinner', 'laserH', 'grid');
  if (progress > 0.8)  pool.push('laserH', 'ring', 'spinner');
  return pool[Math.floor(Math.random() * pool.length)];
}

function addGlowEdge(parent, w, h, d, mat) {
  const s = 0.08;
  const geo = new THREE.BoxGeometry(w+s, h+s, d+s);
  const m = new THREE.Mesh(geo, mat);
  m.position.copy(parent.position);
  m.rotation.copy(parent.rotation);
  scene.add(m);
  // Store for cleanup
  if (!parent.userData.edges) parent.userData.edges = [];
  parent.userData.edges.push(m);
}

// ---- Explosion Particles ----
const EXPL_COUNT = 200;
const explGeo = new THREE.BufferGeometry();
const explPositions = new Float32Array(EXPL_COUNT * 3);
const explVelocities = new Float32Array(EXPL_COUNT * 3);
const explAlphas = new Float32Array(EXPL_COUNT);
const explSizes = new Float32Array(EXPL_COUNT);
explGeo.setAttribute('position', new THREE.BufferAttribute(explPositions, 3));
explGeo.setAttribute('alpha', new THREE.BufferAttribute(explAlphas, 1));
explGeo.setAttribute('size', new THREE.BufferAttribute(explSizes, 1));
const explMat = new THREE.ShaderMaterial({
  transparent:true, depthWrite:false,
  vertexShader:`
    attribute float alpha;
    attribute float size;
    varying float vAlpha;
    void main(){
      vAlpha = alpha;
      vec4 mv = modelViewMatrix * vec4(position,1.0);
      gl_PointSize = size * (150.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }
  `,
  fragmentShader:`
    varying float vAlpha;
    uniform vec3 color;
    void main(){
      float d = length(gl_PointCoord - vec2(0.5));
      if(d > 0.5) discard;
      gl_FragColor = vec4(color, vAlpha * (1.0 - d*2.0));
    }
  `,
  uniforms:{ color:{ value:new THREE.Color(0xff4444) } }
});
const explPoints = new THREE.Points(explGeo, explMat);
explPoints.visible = false;
scene.add(explPoints);
let explLife = 0;

function triggerExplosion(pos, color) {
  explMat.uniforms.color.value.set(color || 0xff4444);
  for (let i = 0; i < EXPL_COUNT; i++) {
    explPositions[i*3]   = pos.x;
    explPositions[i*3+1] = pos.y;
    explPositions[i*3+2] = pos.z;
    const spd = 0.2 + Math.random()*0.8;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.random()*Math.PI;
    explVelocities[i*3]   = Math.sin(phi)*Math.cos(theta)*spd;
    explVelocities[i*3+1] = Math.sin(phi)*Math.sin(theta)*spd;
    explVelocities[i*3+2] = Math.cos(phi)*spd;
    explAlphas[i] = 1;
    explSizes[i] = 2 + Math.random()*4;
  }
  explGeo.attributes.position.needsUpdate = true;
  explGeo.attributes.alpha.needsUpdate = true;
  explGeo.attributes.size.needsUpdate = true;
  explPoints.visible = true;
  explLife = 1;
}

function updateExplosion(dt) {
  if (explLife <= 0) return;
  explLife -= 0.015 * dt;
  for (let i = 0; i < EXPL_COUNT; i++) {
    explPositions[i*3]   += explVelocities[i*3]   * dt;
    explPositions[i*3+1] += explVelocities[i*3+1] * dt;
    explPositions[i*3+2] += explVelocities[i*3+2] * dt;
    explVelocities[i*3+1] -= 0.005 * dt;
    explAlphas[i] = Math.max(0, explLife);
  }
  explGeo.attributes.position.needsUpdate = true;
  explGeo.attributes.alpha.needsUpdate = true;
  if (explLife <= 0) explPoints.visible = false;
}

let touchStartX = null, touchStartY = null, touchDX = 0, touchDZ = 0;

// ---- Mobile Detection & D-Pad ----
const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
  || ('ontouchstart' in window && navigator.maxTouchPoints > 1);

const dpadEl = document.getElementById('mobile-dpad');
if (isMobile) {
  dpadEl.style.display = 'block';

  // Track which directions are active (supports multi-touch on dpad)
  const dpadState = { up:false, down:false, left:false, right:false };

  function updateInputFromDpad() {
    input.up    = dpadState.up;
    input.down  = dpadState.down;
    input.left  = dpadState.left;
    input.right = dpadState.right;
  }

  function getDirFromTouch(touch) {
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el && el.closest && el.closest('.dpad-btn')) {
      return el.closest('.dpad-btn').dataset.dir;
    }
    return null;
  }

  // Handle touch events on the dpad container
  dpadEl.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    for (const touch of e.changedTouches) {
      const dir = getDirFromTouch(touch);
      if (dir) {
        dpadState[dir] = true;
        document.getElementById('dpad-' + dir).classList.add('active');
      }
    }
    updateInputFromDpad();
  }, { passive:false });

  dpadEl.addEventListener('touchmove', e => {
    e.preventDefault();
    e.stopPropagation();
    // Reset all then re-detect from all current touches
    dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    document.querySelectorAll('.dpad-btn').forEach(b => b.classList.remove('active'));
    for (const touch of e.touches) {
      const dir = getDirFromTouch(touch);
      if (dir) {
        dpadState[dir] = true;
        document.getElementById('dpad-' + dir).classList.add('active');
      }
    }
    updateInputFromDpad();
  }, { passive:false });

  dpadEl.addEventListener('touchend', e => {
    e.preventDefault();
    e.stopPropagation();
    // Re-check remaining touches
    dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    document.querySelectorAll('.dpad-btn').forEach(b => b.classList.remove('active'));
    for (const touch of e.touches) {
      const dir = getDirFromTouch(touch);
      if (dir) {
        dpadState[dir] = true;
        document.getElementById('dpad-' + dir).classList.add('active');
      }
    }
    updateInputFromDpad();
  }, { passive:false });

  dpadEl.addEventListener('touchcancel', e => {
    dpadState.up = dpadState.down = dpadState.left = dpadState.right = false;
    document.querySelectorAll('.dpad-btn').forEach(b => b.classList.remove('active'));
    updateInputFromDpad();
  }, { passive:false });

  // Start game on tap anywhere else
  document.addEventListener('touchstart', e => {
    if (state === S.MENU && !e.target.closest('#mobile-dpad') && !e.target.closest('.play-btn') && !e.target.closest('.retry-btn')) {
      startGame();
    }
  }, { passive:false });
} else {
  // Desktop: no dpad needed, keep the old fallback touch drag for tablets with keyboards
  document.addEventListener('touchstart', e => {
    e.preventDefault();
    if (state === S.MENU) { startGame(); return; }
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive:false });
  document.addEventListener('touchmove', e => {
    e.preventDefault();
    if (touchStartX === null) return;
    const t = e.touches[0];
    touchDX = (t.clientX - touchStartX) / (innerWidth * 0.15);
    touchDZ = (t.clientY - touchStartY) / (innerHeight * 0.2);
    touchDX = Math.max(-1, Math.min(1, touchDX));
    touchDZ = Math.max(-1, Math.min(1, touchDZ));
  }, { passive:false });
  document.addEventListener('touchend', () => {
    touchStartX = null; touchDX = 0; touchDZ = 0;
  });
}

function clearObstacles() {
  obstacles.forEach(o => {
    o.parts.forEach(p => {
      if (p.userData && p.userData.edges) {
        p.userData.edges.forEach(e => { scene.remove(e); e.geometry.dispose(); });
      }
      scene.remove(p);
      if (p.geometry) p.geometry.dispose();

  });
  obstacles = [];
}

// ---- Collision ----
// Proper OBB collision: transform player sphere into mesh LOCAL space,
// then check against the geometry's local bounding box.
// This eliminates AABB inflation from rotated objects.
const _localPlayer = new THREE.Vector3();
const _invMat = new THREE.Matrix4();
const _localClosest = new THREE.Vector3();

function sphereVsMesh(px, py, pz, r, mesh) {
  // For groups, recurse into children
  if (mesh.isGroup) {
    for (const child of mesh.children) {
      if ((child.isMesh || child.isGroup) && sphereVsMesh(px, py, pz, r, child)) return true;
    }
    return false;
  }
  if (!mesh.geometry) return false;

  // Ensure geometry has a computed local bounding box
  if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
  const localBB = mesh.geometry.boundingBox;

  // Get mesh's world matrix and invert it
  mesh.updateMatrixWorld(true);
  _invMat.copy(mesh.matrixWorld).invert();

  // Transform player world position into mesh's local space
  _localPlayer.set(px, py, pz);
  _localPlayer.applyMatrix4(_invMat);

  // Now clamp to local AABB (which is axis-aligned in local space — correct!)
  _localClosest.set(
    Math.max(localBB.min.x, Math.min(_localPlayer.x, localBB.max.x)),
    Math.max(localBB.min.y, Math.min(_localPlayer.y, localBB.max.y)),
    Math.max(localBB.min.z, Math.min(_localPlayer.z, localBB.max.z))
  );

  // Distance in local space
  const dx = _localPlayer.x - _localClosest.x;
  const dy = _localPlayer.y - _localClosest.y;
  const dz = _localPlayer.z - _localClosest.z;

  // Compare against hitbox radius
  // Note: if mesh has non-uniform scale, r should be scaled too,
  // but our obstacles use uniform scale so this is fine
  return (dx*dx + dy*dy + dz*dz) < r*r;
}

function checkCollision() {
  const px = playerGroup.position.x;
  const py = playerGroup.position.y;
  const pz = playerGroup.position.z;
  const hitboxReduction = getUpgradeVal('hitbox', 0);
  const r = PLAYER_HITBOX * (1 - hitboxReduction);

  // Y tolerance: scale with speed so fast movement doesn't skip frames
  const yTol = 3 + speed * 0.8;

  for (const obs of obstacles) {
    if (obs.passed) continue;
    if (Math.abs(py - obs.y) > yTol) continue;

    // Ring: optional bonus. Segments are solid (kill on hit).
    // Flying through the center hole = speed reduction reward.
    // Flying around the outside = safe, no penalty.
    if (obs.type === 'ring') {
      // Check if player hits any ring SEGMENT (these are solid)
      for (const part of obs.parts) {
        if (sphereVsMesh(px, py, pz, r, part)) return obs;
      }
      // Check if player passes through the hole (reward)
      if (!obs._ringTriggered) {
        const dy = Math.abs(py - obs.y);
        if (dy < 2.5) {
          const dist = Math.sqrt(px*px + pz*pz);
          if (dist < obs.innerR - r) {
            obs._ringTriggered = true;
            // Speed brake reward!
            const ringSlowMph = getUpgradeVal('ringboost', 15);
            speed = Math.max(0.3, speed - ringSlowMph / 30);
            ringsHit++;
            showSpeedBrake();
          }
        }
      }
      continue;
    }

    // All other types: per-mesh OBB sphere collision check
    for (const part of obs.parts) {
      if (sphereVsMesh(px, py, pz, r, part)) return obs;
    }
  }
  return null;
}

// ---- Near miss ----
function nearestDistToObs(px, py, pz, obs) {
  let minDist = Infinity;
  for (const part of obs.parts) {
    const meshes = part.isGroup ? part.children.filter(c => c.isMesh) : [part];
    for (const mesh of meshes) {
      if (!mesh.geometry) continue;
      if (!mesh.geometry.boundingBox) mesh.geometry.computeBoundingBox();
      const localBB = mesh.geometry.boundingBox;

      mesh.updateMatrixWorld(true);
      _invMat.copy(mesh.matrixWorld).invert();

      _localPlayer.set(px, py, pz);
      _localPlayer.applyMatrix4(_invMat);

      _localClosest.set(
        Math.max(localBB.min.x, Math.min(_localPlayer.x, localBB.max.x)),
        Math.max(localBB.min.y, Math.min(_localPlayer.y, localBB.max.y)),
        Math.max(localBB.min.z, Math.min(_localPlayer.z, localBB.max.z))
      );
      const dx = _localPlayer.x - _localClosest.x;
      const dy = _localPlayer.y - _localClosest.y;
      const dz = _localPlayer.z - _localClosest.z;
      minDist = Math.min(minDist, Math.sqrt(dx*dx + dy*dy + dz*dz));
    }
  }
  return minDist;
}

function checkNearMiss() {
  const px = playerGroup.position.x;
  const py = playerGroup.position.y;
  const pz = playerGroup.position.z;

  for (const obs of obstacles) {
    if (obs.passed || obs._nearMissed) continue;
    if (Math.abs(py - obs.y) > 5) continue;

    const dist = nearestDistToObs(px, py, pz, obs);

    if (dist < 3.5 && dist > PLAYER_HITBOX) {
      obs._nearMissed = true;
      nearMisses++;
      showNearMiss();
    }
  }
}

// ---- Start / Reset ----
function startGame() {
  state = S.PLAY;
  altitude = activeBonus.headstart ? 5000 : START_ALT;
  speed = 0; maxSpd = 0;
  playerVX = 0; playerVZ = 0;
  tiltX = 0; tiltZ = 0;

  obsPassed = 0; nearMisses = 0; ringsHit = 0;

  fallDist = 0;

// ---- End Screens ----

  const t = (gameTime / 60).toFixed(1);

  // Settle coins
  totalCoins += runCoins;

function showDeath() {
  // Shield bonus — survive one hit
  if (activeBonus.shield) {
    activeBonus.shield = false;
    invulnFrames = 60; // brief invuln after shield use
    shakeAmt = 0.6;
    // Flash a message
    const el = document.getElementById('speedbrake');
    el.textContent = 'SHIELD ABSORBED HIT';
    el.style.color = '#44ccff';
    el.style.opacity = '1';

  }
  state = S.DYING;
  dieTimer = 0;
  shakeAmt = 1.5;
  triggerExplosion(playerGroup.position.clone(), 0xff4444);
  playerGroup.visible = false;
}

function showDeathScreen() {

  `;
