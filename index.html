// ---- Main Loop ----
let prevTime = performance.now();

function loop(time) {
  requestAnimationFrame(loop);
  const rawDt = (time - prevTime) / 16.67;
  const dt = Math.min(rawDt, 3);
  prevTime = time;

  if (state === S.MENU) {
    // Gentle camera rotation on menu
    camera.position.set(Math.sin(time*0.0003)*8, 15, Math.cos(time*0.0003)*8);
    camera.lookAt(0, -10, 0);
    starField.visible = true;
    starField.rotation.y = time * 0.00005;
    scene.fog.color.set(0x0a0a1a);
    renderer.setClearColor(0x0a0a1a);
    renderer.render(scene, camera);
    return;
  }

  // ---- PLAY STATE ----
  if (state === S.PLAY) {
    gameTime += dt;

    // Speed ramp — slow ease-in, gradual build, punchy final 20%
    const progress = 1 - altitude / START_ALT;
    // Quadratic ease: crawls at start, builds momentum mid-game, kicks hard last 20%
    const eased = progress < 0.8
      ? progress * progress * 1.5   // gentle quadratic 0→0.96
      : 0.96 + (progress - 0.8) * 4.0; // sharp final ramp 0.96→1.76
    const targetSpeed = 0.6 + eased * 2.8;
    speed += (targetSpeed - speed) * 0.006 * dt;
    speed = Math.min(speed, TERMINAL_SPD); // terminal velocity cap
    maxSpd = Math.max(maxSpd, speed);

    // Altitude
    altitude -= speed * 1.8 * dt;

    // Earn coins
    tickCoins();

    // Check deploy
    if (altitude <= DEPLOY_ALT) {
      state = S.CHUTE;
      chuteTimer = 0;
      chutePhase = 0; // 0=reach, 1=pull, 2=deploy, 3=float, 4=land
      chutePhaseTime = 0;
      playerGroup.visible = false;
      trailPoints.visible = false;
      document.getElementById('hud').classList.remove('show');
      document.getElementById('alt-track').classList.remove('show');
      document.getElementById('coin-hud').classList.remove('show');
      document.getElementById('chute-cinema').classList.add('show');
      initChuteCanvas();
      return;
    }

    // Player movement
    let moveX = 0, moveZ = 0;
    if (input.left)  moveX -= 1;
    if (input.right) moveX += 1;
    if (input.up)    moveZ -= 1;
    if (input.down)  moveZ += 1;

    // Touch
    if (touchStartX !== null) {
      moveX += touchDX;
      moveZ += touchDZ;
    }

    const accelBoost = 1 + getUpgradeVal('accel', 0);
    const accel = 0.06 * accelBoost * dt;
    const friction = 0.90;
    playerVX += moveX * accel;
    playerVZ += moveZ * accel;
    playerVX *= friction;
    playerVZ *= friction;

    playerGroup.position.x += playerVX * dt;
    playerGroup.position.z += playerVZ * dt;

    // Clamp to cylinder
    const distFromCenter = Math.sqrt(playerGroup.position.x ** 2 + playerGroup.position.z ** 2);
    const maxR = CORRIDOR_R - 2;
    if (distFromCenter > maxR) {
      const angle = Math.atan2(playerGroup.position.z, playerGroup.position.x);
      playerGroup.position.x = Math.cos(angle) * maxR;
      playerGroup.position.z = Math.sin(angle) * maxR;
      // Kill velocity component pointing outward
      const nx = Math.cos(angle), nz = Math.sin(angle);
      const dot = playerVX * nx + playerVZ * nz;
      if (dot > 0) { playerVX -= dot * nx * 0.8; playerVZ -= dot * nz * 0.8; }
    }

    // Tilt
    tiltX += (playerVX * 8 - tiltX) * 0.1 * dt;
    tiltZ += (-playerVZ * 5 - tiltZ) * 0.1 * dt;
    playerGroup.rotation.z = -tiltX;
    playerGroup.rotation.x = tiltZ * 0.5;

    // Arm spread based on tilt
    armL.rotation.z = -0.7 - Math.abs(tiltX)*0.3;
    armR.rotation.z = 0.7 + Math.abs(tiltX)*0.3;

    // Move world downward (player stays at y~0, world moves up)
    const fallStep = speed * 1.6 * dt;
    fallDist += fallStep;

    // Move obstacles up
    obstacles.forEach(o => {
      o.y += fallStep;
      o.parts.forEach(p => {
        if (p.isGroup) {
          p.position.y += fallStep;
        } else {
          p.position.y += fallStep;
        }
        if (p.userData && p.userData.edges) {
          p.userData.edges.forEach(e => e.position.y += fallStep);
        }
      });

      // Spinners rotate
      if (o.type === 'spinner' && o.pivot) {
        o.pivot.rotation.y += o.rotSpeed * dt;
      }
      if (o.type === 'cross') {
        o.parts.forEach(p => p.rotation.y += o.rotSpeed * dt);
      }

      // Check passed
      if (!o.passed && o.y > 10) {
        o.passed = true;
        obsPassed++;
        combo++;
        comboTime = 90;
        maxCombo = Math.max(maxCombo, combo);
        if (combo >= 3) showCombo(combo);
      }
    });

    // Remove far obstacles
    const toRemove = obstacles.filter(o => o.y > 80);
    toRemove.forEach(o => {
      o.parts.forEach(p => {
        if (p.userData && p.userData.edges) {
          p.userData.edges.forEach(e => { scene.remove(e); e.geometry.dispose(); });
        }
        scene.remove(p);
        if (p.geometry) p.geometry.dispose();
        if (p.children) p.children.forEach(c => { scene.remove(c); if(c.geometry) c.geometry.dispose(); });
      });
    });
    obstacles = obstacles.filter(o => o.y <= 80);

    // Spawn new obstacles
    while (nextObsY + fallDist > -300) {
      const worldY = nextObsY;
      spawnObstacleRow(worldY);
      const progress2 = 1 - altitude / START_ALT;
      nextObsY -= OBS_SPACING * Math.max(0.55, 1.3 - progress2 * 0.75);
    }

    // Move clouds
    cloudMeshes.forEach(c => {
      c.position.y += fallStep * 0.6;
      if (c.position.y > 80) c.position.y -= 1000;
    });

    // Move cylinder with player
    corridorCylinder.position.y = playerGroup.position.y - cylHeight/2 + 50;
    corridorWire.position.y = playerGroup.position.y - cylHeight/2 + 50;
    topRing.position.y = playerGroup.position.y + 40;

    // Combo timer
    if (comboTime > 0) {
      comboTime -= dt;
      if (comboTime <= 0) combo = 0;
    }
    if (comboHideTimer > 0) { comboHideTimer -= dt; if(comboHideTimer<=0) comboEl.style.opacity='0'; }
    if (nmHideTimer > 0) { nmHideTimer -= dt; if(nmHideTimer<=0) nearmissEl.style.opacity='0'; }
    if (sbHideTimer > 0) { sbHideTimer -= dt; if(sbHideTimer<=0) speedbrakeEl.style.opacity='0'; }
    if (coinEarnTimer > 0) { coinEarnTimer -= dt; if(coinEarnTimer<=0) document.getElementById('coin-earn').style.opacity='0'; }

    // Collision (skip during grace period)
    if (invulnFrames > 0) {
      invulnFrames -= dt;
    } else {
      const hit = checkCollision();
      if (hit) {
        showDeath();
        return;
      }
    }

    // Near miss
    checkNearMiss();

    // Trail
    trailPositions[trailIdx*3]   = playerGroup.position.x + (Math.random()-0.5)*0.5;
    trailPositions[trailIdx*3+1] = playerGroup.position.y + 1.5;
    trailPositions[trailIdx*3+2] = playerGroup.position.z + (Math.random()-0.5)*0.5;
    trailAlphas[trailIdx] = 0.7;
    trailIdx = (trailIdx + 1) % TRAIL_COUNT;
    for (let i = 0; i < TRAIL_COUNT; i++) {
      trailAlphas[i] = Math.max(0, trailAlphas[i] - 0.012 * dt);
      trailPositions[i*3+1] += fallStep * 0.3; // trail drifts up relative
    }
    trailGeo.attributes.position.needsUpdate = true;
    trailGeo.attributes.alpha.needsUpdate = true;

    updateHUD();
  }

  // ---- CHUTE STATE — Cinematic Parachute Sequence ----
  if (state === S.CHUTE) {
    chuteTimer += dt;
    chutePhaseTime += dt;
    updateChuteAnimation(dt, time);

    // 3D scene still renders softly in background
    const fallStep = 0.2 * dt;
    cloudMeshes.forEach(c => { c.position.y += fallStep * 0.3; });

    if (chutePhase >= 5) {
      document.getElementById('chute-cinema').classList.remove('show');
      showWin();
      return;
    }
  }

  // ---- DYING STATE ----
  if (state === S.DYING) {
    dieTimer += dt;
    updateExplosion(dt);
    shakeAmt *= 0.96;
    if (dieTimer > 80) showDeathScreen();
  }

  // ---- Camera ----
  const camTargetX = playerGroup.position.x * 0.5;
  const camTargetZ = playerGroup.position.z * 0.3;
  const camHeight = state === S.CHUTE ? 22 + chuteTimer * 0.05 : 18;
  const camBack = state === S.CHUTE ? 8 : 5 + speed * 0.3;

  camera.position.x += (camTargetX - camera.position.x) * 0.05 * dt;
  camera.position.y += (camHeight - camera.position.y) * 0.05 * dt;
  camera.position.z += (camTargetZ + camBack - camera.position.z) * 0.05 * dt;

  // Shake
  if (shakeAmt > 0.01) {
    camera.position.x += (Math.random()-0.5) * shakeAmt;
    camera.position.y += (Math.random()-0.5) * shakeAmt;
  }

  camera.lookAt(playerGroup.position.x, playerGroup.position.y - 15, playerGroup.position.z - 5);

  // ---- Environment ----
  const zc = zoneColors(altitude);
  const fogColor = new THREE.Color(zc.fog);
  scene.fog.color.lerp(fogColor, 0.02 * dt);
  renderer.setClearColor(scene.fog.color);

  // Cylinder color shifts with zone
  const zoneCol = new THREE.Color(zc.obs);
  cylMat.color.lerp(zoneCol, 0.02 * dt);
  cylMat.emissive.lerp(new THREE.Color(zc.em), 0.02 * dt);
  cylMat.opacity = 0.05 + Math.sin(time * 0.001) * 0.015;
  cylWireMat.color.lerp(zoneCol, 0.02 * dt);
  cylWireMat.opacity = 0.03 + Math.sin(time * 0.0015) * 0.01;
  ringMat.color.lerp(zoneCol, 0.02 * dt);

  // Stars fade with altitude
  starField.visible = altitude > 3000;
  if (starField.visible) {
    starMat.opacity = Math.min(0.6, (altitude - 3000) / 3000);
    starField.rotation.y = time * 0.00003;
  }

  // Ambient light shifts
  ambLight.color.lerp(fogColor, 0.01 * dt);

  // Explosion
  updateExplosion(dt);

  renderer.render(scene, camera);
}

requestAnimationFrame(loop);

// ═══════════════════════════════════════════════════════════
// CINEMATIC PARACHUTE SEQUENCE — Full-screen 2D Canvas
// ═══════════════════════════════════════════════════════════
let chutePhase = 0;     // 0:reach 1:pull 2:deploy 3:float 4:land 5:done
let chutePhaseTime = 0;
let cCtx, cW, cH;
let chuteParticles = [];

// Phase durations (in frames at ~60fps)
const PHASE_DUR = [55, 40, 75, 220, 65];

function initChuteCanvas() {
  const cc = document.getElementById('chute-canvas');
  cW = cc.width = innerWidth;
  cH = cc.height = innerHeight;
  cCtx = cc.getContext('2d');
  chuteParticles = [];
  for (let i = 0; i < 60; i++) {
    chuteParticles.push({
      x: Math.random() * cW,
      y: Math.random() * cH,
      speed: 3 + Math.random() * 8,
      len: 20 + Math.random() * 60,
      alpha: 0.1 + Math.random() * 0.2
    });
  }
}

function advancePhase() {
  chutePhase++;
  chutePhaseTime = 0;
}

function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}
function easeOutElastic(t) {
  if (t === 0 || t === 1) return t;
  return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * (2 * Math.PI) / 3) + 1;
}

function updateChuteAnimation(dt, time) {
  if (!cCtx) return;
  const t = chutePhaseTime;
  const dur = PHASE_DUR[chutePhase] || 999;
  const progress = Math.min(1, t / dur);

  cCtx.clearRect(0, 0, cW, cH);

  // Sky background — lightens as we descend
  const skyDark = chutePhase < 3 ? 0.85 : Math.max(0.35, 0.85 - (chutePhase === 3 ? progress * 0.5 : 0.5));
  const skyGrad = cCtx.createLinearGradient(0, 0, 0, cH);
  skyGrad.addColorStop(0, `rgba(${Math.floor(30*skyDark)},${Math.floor(60*skyDark)},${Math.floor(130*skyDark)},1)`);
  skyGrad.addColorStop(1, `rgba(${Math.floor(50*skyDark)},${Math.floor(100*skyDark)},${Math.floor(85*skyDark)},1)`);
  cCtx.fillStyle = skyGrad;
  cCtx.fillRect(0, 0, cW, cH);

  // Wind streaks
  const windMult = chutePhase < 2 ? 1 : chutePhase === 2 ? (1 - progress * 0.85) : 0.08;
  chuteParticles.forEach(p => {
    p.y += p.speed * windMult * dt;
    if (p.y > cH + 50) { p.y = -50; p.x = Math.random() * cW; }
    cCtx.strokeStyle = `rgba(255,255,255,${p.alpha * windMult})`;
    cCtx.lineWidth = 1;
    cCtx.beginPath();
    cCtx.moveTo(p.x, p.y);
    cCtx.lineTo(p.x + (Math.random()-0.5)*2, p.y + p.len * windMult);
    cCtx.stroke();
  });

  // Background clouds
  const cloudBaseY = chutePhase >= 3 ? cH * 0.12 - progress * cH * 0.35 : cH * 0.12;
  for (let i = 0; i < 5; i++) {
    const ccx = cW * (0.1 + i * 0.2) + Math.sin(time * 0.0003 + i * 1.7) * 30;
    const ccy = cloudBaseY + i * 18;
    const cAlpha = chutePhase >= 3 ? Math.max(0, 0.07 - progress * 0.05) : 0.07;
    cCtx.fillStyle = `rgba(255,255,255,${cAlpha})`;
    cCtx.beginPath();
    cCtx.ellipse(ccx, ccy, 90 + i*25, 16 + i*6, 0, 0, Math.PI*2);
    cCtx.fill();
  }

  // ---- CHARACTER ----
  const charCX = cW / 2;
  const charBaseY = cH * 0.5;
  const floatDrift = chutePhase === 3 ? progress * cH * 0.18 : (chutePhase === 4 ? cH * 0.18 + progress * cH * 0.06 : 0);
  const charSway = chutePhase >= 2 ? Math.sin(time * 0.002) * 10 * (chutePhase >= 3 ? 1 : progress) : 0;
  const charY = charBaseY + floatDrift;
  const charX = charCX + charSway;

  const sc = chutePhase === 0 ? 1.0 :
             chutePhase === 1 ? 1.0 + progress * 0.3 :
             chutePhase === 2 ? 1.3 - progress * 0.15 :
             chutePhase === 3 ? 1.15 - progress * 0.15 :
             1.0 - progress * 0.15;

  cCtx.save();
  cCtx.translate(charX, charY);
  cCtx.scale(sc, sc);
  cCtx.rotate(chutePhase >= 2 ? Math.sin(time * 0.0015) * 0.04 : 0);

  // Legs
  cCtx.strokeStyle = '#cc4422';
  cCtx.lineWidth = 8;
  cCtx.lineCap = 'round';
  const legSpr = chutePhase < 2 ? 0.2 : 0.12;
  cCtx.beginPath(); cCtx.moveTo(-8, 28); cCtx.lineTo(-14 - legSpr*35, 65); cCtx.stroke();
  cCtx.beginPath(); cCtx.moveTo(8, 28);  cCtx.lineTo(14 + legSpr*35, 65);  cCtx.stroke();
  // Boots
  cCtx.fillStyle = '#222';
  cCtx.beginPath(); cCtx.arc(-14 - legSpr*35, 67, 5, 0, Math.PI*2); cCtx.fill();
  cCtx.beginPath(); cCtx.arc(14 + legSpr*35, 67, 5, 0, Math.PI*2); cCtx.fill();

  // Torso
  const tGrad = cCtx.createLinearGradient(-15, -22, 15, 32);
  tGrad.addColorStop(0, '#ff5533');
  tGrad.addColorStop(1, '#cc3311');
  cCtx.fillStyle = tGrad;
  cCtx.beginPath(); cCtx.ellipse(0, 6, 17, 26, 0, 0, Math.PI*2); cCtx.fill();

  // Backpack
  cCtx.fillStyle = '#333';
  cCtx.fillRect(-11, -11, 22, 20);
  cCtx.fillStyle = '#444';
  cCtx.fillRect(-9, -9, 18, 16);

  // Arms — phase-dependent
  cCtx.strokeStyle = '#ff5533';
  cCtx.lineWidth = 7;

  if (chutePhase === 0) {
    // Reaching for cord
    const rp = Math.min(1, progress * 1.5);
    const armAng = -0.5 + rp * 1.2;
    cCtx.beginPath(); cCtx.moveTo(-17, -3); cCtx.lineTo(-42, -18); cCtx.stroke();
    const raX = 17 + Math.cos(armAng) * 28 * (1 - rp * 0.3);
    const raY = -3 + Math.sin(armAng) * 28;
    cCtx.beginPath(); cCtx.moveTo(17, -3); cCtx.lineTo(raX, raY); cCtx.stroke();
    cCtx.fillStyle = `rgba(255,200,100,${rp * 0.7})`;
    cCtx.beginPath(); cCtx.arc(raX, raY, 4, 0, Math.PI*2); cCtx.fill();
  }
  else if (chutePhase === 1) {
    // PULLING — dramatic yank
    const pp = easeOutBack(progress);
    const pullY = -5 + pp * 48;
    cCtx.beginPath(); cCtx.moveTo(-17, -3); cCtx.lineTo(-32, 6 + pp * 12); cCtx.stroke();
    cCtx.beginPath(); cCtx.moveTo(17, -3); cCtx.lineTo(11, pullY); cCtx.stroke();
    // Cord
    cCtx.strokeStyle = '#aaa'; cCtx.lineWidth = 2;
    cCtx.beginPath(); cCtx.moveTo(5, -9); cCtx.quadraticCurveTo(8, pullY*0.5, 11, pullY); cCtx.stroke();
    // Handle
    cCtx.fillStyle = '#ff8800';
    cCtx.beginPath(); cCtx.arc(11, pullY, 5, 0, Math.PI*2); cCtx.fill();
    // Flash
    if (progress > 0.7) {
      cCtx.fillStyle = `rgba(255,255,255,${(progress-0.7)/0.3 * 0.35})`;
      cCtx.fillRect(-cW, -cH, cW*3, cH*3);
    }
  }
  else {
    // Holding risers
    const hw = 19 + (chutePhase >= 3 ? Math.sin(time * 0.002) * 3 : 0);
    cCtx.beginPath(); cCtx.moveTo(-17, -3); cCtx.lineTo(-hw, -32); cCtx.stroke();
    cCtx.beginPath(); cCtx.moveTo(17, -3);  cCtx.lineTo(hw, -32);  cCtx.stroke();
    cCtx.fillStyle = '#222';
    cCtx.beginPath(); cCtx.arc(-hw, -32, 3, 0, Math.PI*2); cCtx.fill();
    cCtx.beginPath(); cCtx.arc(hw, -32, 3, 0, Math.PI*2); cCtx.fill();
  }

  // Head
  cCtx.fillStyle = '#ffcc99';
  cCtx.beginPath(); cCtx.arc(0, -26, 11, 0, Math.PI*2); cCtx.fill();
  // Helmet
  cCtx.fillStyle = '#222';
  cCtx.beginPath(); cCtx.ellipse(0, -29, 12, 8.5, 0, Math.PI, 0); cCtx.fill();
  // Goggles
  cCtx.fillStyle = '#44ccff'; cCtx.globalAlpha = 0.85;
  cCtx.beginPath(); cCtx.ellipse(0, -25, 10, 3.8, 0, 0, Math.PI*2); cCtx.fill();
  cCtx.globalAlpha = 1;
  cCtx.fillStyle = 'rgba(255,255,255,0.3)';
  cCtx.beginPath(); cCtx.ellipse(-3, -26, 3.5, 1.5, -0.3, 0, Math.PI*2); cCtx.fill();

  // ---- PARACHUTE CANOPY (phase 2+) ----
  if (chutePhase >= 2) {
    const dp = chutePhase === 2 ? easeOutElastic(Math.min(1, progress * 1.2)) : 1;
    const cW2 = 130 * dp;
    const cH2 = 80 * dp;
    const cY2 = -38 - cH2 - 22 * dp;

    // Risers
    cCtx.strokeStyle = `rgba(255,255,255,${0.35 * dp})`;
    cCtx.lineWidth = 1.5;
    const hw = 19;
    for (let i = -3; i <= 3; i++) {
      cCtx.beginPath();
      cCtx.moveTo(i < 0 ? -hw : hw, -32);
      cCtx.quadraticCurveTo(i * cW2 * 0.12, cY2 + cH2 * 0.7, i * cW2 * 0.15, cY2 + cH2 * 0.15);
      cCtx.stroke();
    }

    // Canopy body
    const canGrad = cCtx.createRadialGradient(0, cY2 + cH2*0.3, 0, 0, cY2 + cH2*0.3, cW2);
    canGrad.addColorStop(0, `rgba(255,85,51,${0.92 * dp})`);
    canGrad.addColorStop(0.7, `rgba(204,51,17,${0.87 * dp})`);
    canGrad.addColorStop(1, `rgba(153,34,10,${0.72 * dp})`);
    cCtx.fillStyle = canGrad;
    cCtx.beginPath();
    cCtx.ellipse(0, cY2 + cH2 * 0.3, cW2, cH2 * 0.72, 0, Math.PI, 0);
    cCtx.fill();

    // Highlight
    cCtx.fillStyle = `rgba(255,255,255,${0.12 * dp})`;
    cCtx.beginPath();
    cCtx.ellipse(-cW2*0.2, cY2 + cH2*0.15, cW2*0.3, cH2*0.22, -0.2, Math.PI, 0);
    cCtx.fill();

    // Stripes
    cCtx.fillStyle = `rgba(255,255,255,${0.14 * dp})`;
    for (let i = -2; i <= 2; i++) {
      cCtx.beginPath();
      cCtx.ellipse(i * cW2 * 0.22, cY2 + cH2*0.3, cW2*0.055, cH2*0.65, 0, Math.PI, 0);
      cCtx.fill();
    }

    // Billow
    if (chutePhase >= 3) {
      const bil = Math.sin(time * 0.003) * 4 * dp;
      cCtx.fillStyle = 'rgba(255,255,255,0.025)';
      cCtx.beginPath();
      cCtx.ellipse(bil, cY2 + cH2*0.3, cW2*1.03, cH2*0.74, 0, Math.PI, 0);
      cCtx.fill();
    }
  }

  cCtx.restore();

  // ---- GROUND (phases 3-4) ----
  if (chutePhase >= 3) {
    const groundRise = chutePhase === 3 ? progress : 1;
    const groundY = cH + 50 - groundRise * (cH * 0.28);
    const landY = chutePhase === 4 ? groundY - progress * 25 : groundY;

    const gGrad = cCtx.createLinearGradient(0, landY, 0, cH);
    gGrad.addColorStop(0, '#3a6630');
    gGrad.addColorStop(0.3, '#2d5525');
    gGrad.addColorStop(1, '#1a3318');
    cCtx.fillStyle = gGrad;
    cCtx.fillRect(0, landY, cW, cH - landY + 10);

    // Landing zone
    const lzA = chutePhase === 3 ? progress * 0.35 : 0.35 + progress * 0.2;
    cCtx.strokeStyle = `rgba(255,255,255,${lzA})`;
    cCtx.lineWidth = 2;
    cCtx.setLineDash([6, 4]);
    cCtx.beginPath();
    cCtx.ellipse(cW/2, landY + 28, 55, 14, 0, 0, Math.PI*2);
    cCtx.stroke();
    cCtx.setLineDash([]);

    cCtx.strokeStyle = `rgba(255,100,50,${lzA})`;
    cCtx.lineWidth = 2;
    cCtx.beginPath();
    cCtx.moveTo(cW/2 - 10, landY + 28 - 5);
    cCtx.lineTo(cW/2 + 10, landY + 28 + 5);
    cCtx.moveTo(cW/2 + 10, landY + 28 - 5);
    cCtx.lineTo(cW/2 - 10, landY + 28 + 5);
    cCtx.stroke();
  }

  // ---- PHASE TEXT ----
  cCtx.textAlign = 'center';
  if (chutePhase === 0 && progress > 0.3) {
    const a = Math.min(1, (progress - 0.3) * 2.5);
    cCtx.font = `${15}px 'JetBrains Mono', monospace`;
    cCtx.fillStyle = `rgba(255,200,100,${a * 0.7})`;
    cCtx.fillText('REACHING FOR CORD...', cW/2, cH * 0.17);
  }
  if (chutePhase === 1) {
    const a = Math.min(1, progress * 3);
    cCtx.font = `bold ${Math.floor(22 + progress * 18)}px 'Bebas Neue', sans-serif`;
    cCtx.fillStyle = `rgba(255,150,50,${a})`;
    cCtx.fillText('PULL!', cW/2, cH * 0.15);
  }
  if (chutePhase === 2 && progress < 0.65) {
    const a = 1 - progress / 0.65;
    cCtx.font = `bold ${Math.floor(38 + progress * 18)}px 'Bebas Neue', sans-serif`;
    cCtx.fillStyle = `rgba(0,255,136,${a})`;
    cCtx.shadowBlur = 25;
    cCtx.shadowColor = `rgba(0,255,136,${a * 0.5})`;
    cCtx.fillText('CHUTE DEPLOYED', cW/2, cH * 0.13);
    cCtx.shadowBlur = 0;
  }
  if (chutePhase === 3 && progress > 0.7) {
    const a = (progress - 0.7) / 0.3;
    cCtx.font = '14px "JetBrains Mono", monospace';
    cCtx.fillStyle = `rgba(255,255,255,${a * 0.4})`;
    cCtx.fillText('APPROACHING LANDING ZONE', cW/2, cH * 0.09);
  }
  if (chutePhase === 4) {
    const a = Math.min(1, progress * 2);
    cCtx.font = `bold ${Math.floor(46 + progress * 14)}px 'Bebas Neue', sans-serif`;
    cCtx.fillStyle = `rgba(0,255,136,${a})`;
    cCtx.shadowBlur = 30;
    cCtx.shadowColor = `rgba(0,255,136,${a * 0.5})`;
    cCtx.fillText('TOUCHDOWN', cW/2, cH * 0.34);
    cCtx.shadowBlur = 0;
  }

  // Altitude readout
  if (chutePhase >= 2) {
    const displayAlt = Math.max(0, Math.floor(DEPLOY_ALT * (1 - (chutePhase===2 ? progress*0.2 : chutePhase===3 ? 0.2+progress*0.7 : 0.9+progress*0.1))));
    cCtx.font = '15px "JetBrains Mono", monospace';
    cCtx.fillStyle = 'rgba(255,255,255,0.22)';
    cCtx.textAlign = 'right';
    cCtx.fillText(`ALT ${displayAlt} FT`, cW - 24, cH - 24);
  }

  // Auto-advance
  if (t >= dur) advancePhase();
}

// Start on menu
document.getElementById('start-screen').classList.add('show');
</script>
</body>
</html>
